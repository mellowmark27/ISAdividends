<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Freetrade ISA — Income</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f3ef;--surface:#fff;--border:#e2ddd6;--border2:#ccc7be;
  --ink:#1a1814;--ink2:#3d3a35;--ink3:#7a766e;--ink4:#b0ab9e;
  --green:#1a7a4a;--green-bg:#eaf5ef;--amber:#8a5a00;--amber-bg:#fdf4e3;
  --blue:#1a4f7a;--blue-bg:#e8f0f8;--red:#8a1a1a;--accent:#1a7a4a;
  --serif:'DM Serif Display',serif;--mono:'DM Mono',monospace;--body:'Figtree',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--body)}
.app{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:2px}
.hdr-title{font-family:var(--serif);font-size:22px;color:var(--ink)}
.hdr-total{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--green)}
.hdr-sub{font-family:var(--mono);font-size:11px;color:var(--ink4);letter-spacing:0.03em}

/* TABS */
.tabs{background:var(--surface);border-bottom:2px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 18px;font-family:var(--mono);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color 0.12s;flex-shrink:0}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-upload{margin-left:auto;color:var(--ink4);text-decoration:none;border-bottom-color:transparent!important}
.tab-upload:hover{color:var(--accent)}

/* MAIN */
main{flex:1;padding:12px}
.view{display:none}.view.active{display:block;animation:up 0.15s ease}
@keyframes up{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* SECTION LABEL */
.sh{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink4);padding:0 2px 8px}

/* HERO */
.hero{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 18px 16px;margin-bottom:10px;background-image:linear-gradient(135deg,#fff 60%,#f0f7f3 100%)}
.hero-label{font-family:var(--mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink4);margin-bottom:6px}
.hero-amount{font-family:var(--serif);font-size:42px;color:var(--ink);line-height:1;letter-spacing:-1px;margin-bottom:8px}
.hero-amount em{font-style:normal;color:var(--green)}
.hero-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);font-weight:500}
.pill.amber{background:var(--amber-bg);color:var(--amber)}
.pill.blue{background:var(--blue-bg);color:var(--blue)}

/* MONTH LIST */
.month-list{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.month-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.month-row:last-child{border-bottom:none}
.month-name{font-family:var(--mono);font-size:12px;color:var(--ink2);flex:0 0 52px}
.month-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.month-bar{height:4px;background:var(--accent);border-radius:2px}
.month-bar.best{background:var(--green)}
.month-amount{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink);flex:0 0 62px;text-align:right}
.month-count{font-family:var(--mono);font-size:10px;color:var(--ink4);flex:0 0 28px;text-align:right}

/* TYPE LIST */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.type-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.type-row:last-child{border-bottom:none}
.type-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.type-name{font-family:var(--body);font-size:14px;color:var(--ink2);flex:1}
.type-bar-wrap{flex:2;height:3px;background:var(--border);border-radius:2px}
.type-bar{height:3px;border-radius:2px}
.type-amount{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink);flex:0 0 62px;text-align:right}
.type-pct{font-family:var(--mono);font-size:10px;color:var(--ink4);flex:0 0 32px;text-align:right}

/* PAYERS */
.payers-list{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:10px}
.payer-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)}
.payer-row:last-child{border-bottom:none}
.payer-rank{font-family:var(--mono);font-size:10px;color:var(--ink4);flex:0 0 18px;text-align:center}
.payer-info{flex:1;min-width:0}
.payer-name{font-family:var(--body);font-size:14px;color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.payer-ticker{font-family:var(--mono);font-size:10px;color:var(--ink4);margin-top:1px}
.payer-bar-wrap{flex:0 0 48px;height:3px;background:var(--border);border-radius:2px}
.payer-bar{height:3px;background:var(--accent);border-radius:2px}
.payer-amount{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--ink);flex:0 0 62px;text-align:right}
.payer-count{font-family:var(--mono);font-size:10px;color:var(--ink4);flex:0 0 24px;text-align:right}

/* FEED */
.filters{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px}
.filter-row2{display:flex;gap:6px}
input[type=search],select{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-family:var(--mono);font-size:13px;color:var(--ink);outline:none;width:100%;-webkit-appearance:none}
input[type=search]:focus,select:focus{border-color:var(--accent)}
input[type=search]::placeholder{color:var(--ink4)}
select{flex:1;min-width:0}
.feed-count{font-family:var(--mono);font-size:11px;color:var(--ink4);text-align:right}
.feed-list{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px}
.feed-item{padding:10px 14px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:auto 1fr auto;gap:3px 10px;align-items:start}
.feed-item:last-child{border-bottom:none}
.feed-date{font-family:var(--mono);font-size:11px;color:var(--ink4);grid-row:1;padding-top:2px}
.feed-name{font-family:var(--body);font-size:15px;color:var(--ink);font-weight:500;grid-column:2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.feed-amount{font-family:var(--mono);font-size:16px;font-weight:500;color:var(--green);grid-column:3;grid-row:1/3;align-self:center;text-align:right;white-space:nowrap}
.feed-meta{grid-column:2;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.feed-ticker{font-family:var(--mono);font-size:11px;color:var(--ink4)}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-family:var(--mono);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;font-weight:500}
.badge-div{background:#e5f5ec;color:#1a7a4a}.badge-prop{background:#e5edf8;color:#1a4f7a}
.badge-cap{background:#f0ecfa;color:#5a3a9a}.badge-int{background:#e5f5f5;color:#1a6a6a}
.badge-spec{background:#fdf4e3;color:#8a5a00}
.wht-tag{font-family:var(--mono);font-size:11px;color:var(--red);background:#fdeaea;padding:1px 5px;border-radius:4px}
.pager{display:flex;gap:5px;align-items:center;justify-content:space-between;padding:8px 0 2px}
.pager-info{font-family:var(--mono);font-size:12px;color:var(--ink4)}
.pager-btns{display:flex;gap:4px}
.pager-btn{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:8px 14px;font-family:var(--mono);font-size:12px;color:var(--ink3);cursor:pointer;touch-action:manipulation}
.pager-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.pager-btn:disabled{opacity:0.3;pointer-events:none}

/* UPLOAD FOOTER */
.upload-footer{border-top:1px solid var(--border);padding:16px 12px 24px;background:var(--surface);margin-top:4px}
.upload-zone{border:1.5px dashed var(--border2);border-radius:10px;padding:18px 14px;text-align:center;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--accent);background:var(--green-bg)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:22px;margin-bottom:6px;display:block;pointer-events:none}
.upload-label{font-family:var(--mono);font-size:11px;color:var(--ink3);display:block;margin-bottom:3px;pointer-events:none}
.upload-hint{font-family:var(--mono);font-size:11px;color:var(--ink4);pointer-events:none}
.upload-status{margin-top:10px;padding:9px 12px;border-radius:8px;font-family:var(--mono);font-size:12px;display:none}
.upload-status.ok{background:var(--green-bg);color:var(--green);display:block}
.upload-status.err{background:#fdeaea;color:var(--red);display:block}
</style>
</head>
<body>
<div class="app">

<header class="hdr">
  <div class="hdr-top">
    <div class="hdr-title">Freetrade ISA</div>
    <div class="hdr-total" id="hdr-total">—</div>
  </div>
  <div class="hdr-sub" id="hdr-sub">Loading…</div>
</header>

<div class="tabs">
  <div class="tab active" data-view="overview">Overview</div>
  <div class="tab" data-view="toppers">Top Payers</div>
  <div class="tab" data-view="feed">Feed</div>
  <a class="tab tab-upload" href="#upload-footer" id="tab-upload-link">Update Data ↓</a>
</div>

<main>
  <div class="view active" id="view-overview">
    <div class="hero" id="hero-block"></div>
    <div class="sh">Monthly Breakdown</div>
    <div class="month-list" id="month-list"></div>
    <div class="sh">By Income Type</div>
    <div class="card" id="type-list"></div>
  </div>

  <div class="view" id="view-toppers">
    <div class="sh">All Holdings Ranked by Income</div>
    <div class="payers-list" id="payers-list"></div>
  </div>

  <div class="view" id="view-feed">
    <div class="filters">
      <input type="search" id="feed-search" placeholder="Search name or ticker…">
      <div class="filter-row2">
        <select id="feed-type">
          <option value="">All types</option>
          <option value="DIVIDEND">Dividend</option>
          <option value="PROPERTY">Property</option>
          <option value="CAPITAL">Capital</option>
          <option value="INTEREST">Interest</option>
          <option value="SPECIAL_DIVIDEND">Special Div</option>
        </select>
        <select id="feed-month" id="feed-month"><option value="">All months</option></select>
        <select id="feed-sort">
          <option value="date-desc">Date ↓</option>
          <option value="date-asc">Date ↑</option>
          <option value="amount-desc">£ ↓</option>
          <option value="amount-asc">£ ↑</option>
        </select>
      </div>
      <div class="feed-count" id="feed-count"></div>
    </div>
    <div class="feed-list" id="feed-list"></div>
    <div class="pager" id="pager"></div>
  </div>
</main>

<!-- Upload footer is part of the DOM before the script runs -->
<footer class="upload-footer" id="upload-footer">
  <div class="sh" style="margin-bottom:8px;">Update Data</div>
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="csv-input" accept=".csv">
    <span class="upload-icon">📂</span>
    <span class="upload-label" id="upload-label">Drop or tap to upload Freetrade activity CSV</span>
    <span class="upload-hint">activity-feed-export.csv · replaces current data</span>
  </div>
  <div class="upload-status" id="upload-status"></div>
</footer>

</div><!-- /.app -->

// ── CONSTANTS ──
const MONTHS_LABELS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TYPES = {
  DIVIDEND:        { label:'Dividend', color:'#1a7a4a', badge:'badge-div' },
  PROPERTY:        { label:'Property', color:'#1a4f7a', badge:'badge-prop' },
  CAPITAL:         { label:'Capital',  color:'#5a3a9a', badge:'badge-cap' },
  INTEREST:        { label:'Interest', color:'#1a6a6a', badge:'badge-int' },
  SPECIAL_DIVIDEND:{ label:'Special',  color:'#8a5a00', badge:'badge-spec' },
};

// ── UTILS ──
const fmt  = n => '£' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
const fmtS = n => '£' + n.toFixed(2);
const mLabel = m => { const [y,mo]=m.split('-'); return MONTHS_LABELS[+mo-1]+' '+y.slice(2); };
const badge = type => { const i=TYPES[type]||{label:type,badge:'badge-div'}; return `<span class="badge ${i.badge}">${i.label}</span>`; };

// ── DASHBOARD RENDER ──
let currentRenderFeed = null;

function initDashboard(DATA) {
  // Aggregations
  const months = [...new Set(DATA.map(d=>d.month))].sort();
  const total = DATA.reduce((a,d)=>a+d.amount, 0);
  const uniqueTickers = new Set(DATA.map(d=>d.ticker)).size;
  const avgMonthly = total / months.length;

  const monthlyTotals = {}, monthlyCounts = {};
  months.forEach(m=>{
    const rows = DATA.filter(d=>d.month===m);
    monthlyTotals[m] = rows.reduce((a,d)=>a+d.amount, 0);
    monthlyCounts[m] = rows.length;
  });
  const maxMonthly = Math.max(...Object.values(monthlyTotals));
  const bestMonth  = months.find(m=>monthlyTotals[m]===maxMonthly);

  const byTicker = {};
  DATA.forEach(d=>{
    if(!byTicker[d.ticker]) byTicker[d.ticker]={amount:0,title:d.title,count:0};
    byTicker[d.ticker].amount += d.amount;
    byTicker[d.ticker].count++;
  });
  const topPayers = Object.entries(byTicker).sort((a,b)=>b[1].amount-a[1].amount);
  const maxPayer = topPayers[0][1].amount;

  const typeTotals = {};
  DATA.forEach(d=>{ typeTotals[d.type]=(typeTotals[d.type]||0)+d.amount; });
  const maxType = Math.max(...Object.values(typeTotals));

  const dates = DATA.map(d=>d.date).sort();
  const dateRange = mLabel(dates[0].slice(0,7)) + '–' + mLabel(dates[dates.length-1].slice(0,7));

  // Header
  document.getElementById('hdr-total').textContent = fmt(total);
  document.getElementById('hdr-sub').textContent = DATA.length+' payments · '+uniqueTickers+' holdings · '+dateRange;

  // Hero
  document.getElementById('hero-block').innerHTML = `
    <div class="hero-label">Total income received</div>
    <div class="hero-amount"><em>${fmt(total)}</em></div>
    <div class="hero-pills">
      <span class="pill">Avg ${fmt(avgMonthly)}/mo</span>
      <span class="pill amber">Best: ${mLabel(bestMonth)} ${fmt(maxMonthly)}</span>
      <span class="pill blue">${uniqueTickers} holdings</span>
      <span class="pill">${DATA.length} payments</span>
    </div>`;

  // Monthly
  const ml = document.getElementById('month-list');
  ml.innerHTML = '';
  [...months].reverse().forEach(m=>{
    const pct=(monthlyTotals[m]/maxMonthly*100).toFixed(1);
    ml.innerHTML += `<div class="month-row">
      <div class="month-name">${mLabel(m)}</div>
      <div class="month-bar-wrap"><div class="month-bar${m===bestMonth?' best':''}" style="width:${pct}%"></div></div>
      <div class="month-amount">${fmtS(monthlyTotals[m])}</div>
      <div class="month-count">${monthlyCounts[m]}</div>
    </div>`;
  });

  // Types
  const tl = document.getElementById('type-list');
  tl.innerHTML = '';
  Object.entries(typeTotals).sort((a,b)=>b[1]-a[1]).forEach(([type,amount])=>{
    const info=TYPES[type]||{label:type,color:'#999'};
    const pct=(amount/total*100).toFixed(0);
    const bp=(amount/maxType*100).toFixed(0);
    tl.innerHTML += `<div class="type-row">
      <div class="type-dot" style="background:${info.color}"></div>
      <div class="type-name">${info.label}</div>
      <div class="type-bar-wrap"><div class="type-bar" style="width:${bp}%;background:${info.color}88"></div></div>
      <div class="type-amount">${fmtS(amount)}</div>
      <div class="type-pct">${pct}%</div>
    </div>`;
  });

  // Top payers
  const pl = document.getElementById('payers-list');
  pl.innerHTML = '';
  topPayers.forEach(([ticker,info],i)=>{
    const bp=(info.amount/maxPayer*100).toFixed(0);
    pl.innerHTML += `<div class="payer-row">
      <div class="payer-rank">${i+1}</div>
      <div class="payer-info">
        <div class="payer-name">${info.title}</div>
        <div class="payer-ticker">${ticker}</div>
      </div>
      <div class="payer-bar-wrap"><div class="payer-bar" style="width:${bp}%"></div></div>
      <div class="payer-amount">${fmtS(info.amount)}</div>
      <div class="payer-count">${info.count}×</div>
    </div>`;
  });

  // Feed month options
  const ms = document.getElementById('feed-month');
  ms.innerHTML = '<option value="">All months</option>';
  months.forEach(m=>{ ms.innerHTML += `<option value="${m}">${mLabel(m)}</option>`; });

  // Feed render
  let feedPage = 1;
  const PAGE = 30;
  let filtered = [...DATA];

  function renderFeed() {
    const q  = document.getElementById('feed-search').value.toLowerCase();
    const tf = document.getElementById('feed-type').value;
    const mf = document.getElementById('feed-month').value;
    const sf = document.getElementById('feed-sort').value;
    filtered = DATA.filter(d=>{
      if(tf && d.type!==tf) return false;
      if(mf && d.month!==mf) return false;
      if(q && !d.ticker.toLowerCase().includes(q) && !d.title.toLowerCase().includes(q)) return false;
      return true;
    });
    const [sk,sd] = sf.split('-');
    filtered.sort((a,b)=>{ const v=sk==='date'?a.date.localeCompare(b.date):a.amount-b.amount; return sd==='desc'?-v:v; });
    document.getElementById('feed-count').textContent = filtered.length+' results';
    feedPage = 1;
    renderPage();
  }

  function renderPage() {
    const start = (feedPage-1)*PAGE;
    const page  = filtered.slice(start, start+PAGE);
    const fl    = document.getElementById('feed-list');
    fl.innerHTML = '';
    page.forEach(d=>{
      const wt = d.wht>0 ? `<span class="wht-tag">WHT £${d.wht.toFixed(2)}</span>` : '';
      fl.innerHTML += `<div class="feed-item">
        <div class="feed-date">${d.date.slice(5)}</div>
        <div class="feed-name">${d.title}</div>
        <div class="feed-amount">${fmtS(d.amount)}</div>
        <div class="feed-meta"><span class="feed-ticker">${d.ticker}</span>${badge(d.type)}${wt}</div>
      </div>`;
    });
    // Pager
    const tot   = filtered.length;
    const pages = Math.ceil(tot/PAGE)||1;
    const end   = Math.min(feedPage*PAGE, tot);
    const pg    = document.getElementById('pager');
    pg.innerHTML = `
      <div class="pager-info">${start+1}–${end} of ${tot}</div>
      <div class="pager-btns">
        <button class="pager-btn" id="pgprev" ${feedPage===1?'disabled':''}>← Prev</button>
        <button class="pager-btn active">${feedPage}/${pages}</button>
        <button class="pager-btn" id="pgnext" ${feedPage>=pages?'disabled':''}>Next →</button>
      </div>`;
    document.getElementById('pgprev').onclick = ()=>{ feedPage--; renderPage(); };
    document.getElementById('pgnext').onclick = ()=>{ feedPage++; renderPage(); };
  }

  // Store reference so filter listeners (attached once) can call current renderFeed
  currentRenderFeed = renderFeed;
  renderFeed();
}

// ── FILTER LISTENERS — attached once at startup ──
document.getElementById('feed-search').addEventListener('input',  ()=>currentRenderFeed&&currentRenderFeed());
document.getElementById('feed-search').addEventListener('change', ()=>currentRenderFeed&&currentRenderFeed());
document.getElementById('feed-type').addEventListener('change',   ()=>currentRenderFeed&&currentRenderFeed());
document.getElementById('feed-month').addEventListener('change',  ()=>currentRenderFeed&&currentRenderFeed());
document.getElementById('feed-sort').addEventListener('change',   ()=>currentRenderFeed&&currentRenderFeed());

// ── TABS ──
document.querySelectorAll('.tab[data-view]').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab[data-view]').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-'+tab.dataset.view).classList.add('active');
  });
});

// ── CSV PARSER ──
function parseFreetradeCsv(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const col = n => headers.indexOf(n);
  const get = (row,n) => (row[col(n)]||'').trim().replace(/^"|"$/g,'');
  const num = (row,n) => { const v=parseFloat(get(row,n)); return isNaN(v)?0:v; };
  const INCOME = ['DIVIDEND','PROPERTY','INTEREST','CAPITAL','SPECIAL_DIVIDEND'];
  const rows = [];
  for(let i=1;i<lines.length;i++){
    const row = lines[i].split(',');
    if(row.length<5) continue;
    const type = get(row,'Type');
    if(!INCOME.includes(type)) continue;
    const ts = get(row,'Timestamp');
    if(!ts) continue;
    const amount = num(row,'Total Amount in Account Currency');
    if(amount<=0) continue;
    const date = ts.slice(0,10);
    rows.push({
      title:   get(row,'Title'),
      type,    date,
      month:   date.slice(0,7),
      amount:  Math.round(amount*100)/100,
      ticker:  get(row,'Ticker'),
      isin:    get(row,'ISIN'),
      wht:     Math.round(num(row,'Dividend Withheld Tax Amount')*100)/100,
      gross:   Math.round(num(row,'Dividend Gross Distribution Amount')*100)/100,
      qty:     Math.round(num(row,'Dividend Eligible Quantity')*100)/100,
      dps:     Math.round(num(row,'Dividend Amount Per Share')*1e6)/1e6,
      wht_pct: get(row,'Dividend Withheld Tax Percentage'),
      currency:get(row,'Instrument Currency')||'GBP',
      pay_date:get(row,'Dividend Pay Date'),
      ex_date: get(row,'Dividend Ex Date'),
    });
  }
  return rows;
}

// ── UPLOAD ──
const zone      = document.getElementById('upload-zone');
const csvInput  = document.getElementById('csv-input');
const statusEl  = document.getElementById('upload-status');
const labelEl   = document.getElementById('upload-label');

function handleFile(file) {
  if(!file || !file.name.toLowerCase().endsWith('.csv')){
    statusEl.className='upload-status err';
    statusEl.textContent='Please select a .csv file.';
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = parseFreetradeCsv(e.target.result);
      if(parsed.length===0) throw new Error('No income rows found — is this a Freetrade activity-feed-export.csv?');
      initDashboard(parsed);
      statusEl.className='upload-status ok';
      statusEl.textContent='✓ Loaded '+parsed.length+' income events from '+file.name;
      labelEl.textContent = file.name;
    } catch(err) {
      statusEl.className='upload-status err';
      statusEl.textContent='Error: '+err.message;
    }
  };
  reader.readAsText(file);
}

csvInput.addEventListener('change', e=>handleFile(e.target.files[0]));
zone.addEventListener('dragover',   e=>{ e.preventDefault(); zone.classList.add('drag-over'); });
zone.addEventListener('dragleave',  ()=>zone.classList.remove('drag-over'));
zone.addEventListener('drop',       e=>{ e.preventDefault(); zone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });

// ── BOOT with embedded data ──
initDashboard(EMBEDDED);
</script>
